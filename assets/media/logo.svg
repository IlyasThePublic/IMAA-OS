<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    
    <!-- Neon Glow Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <!-- Secondary Glow Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Drop Shadow Filter for Glow -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle representing disk/OS core -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="2" />
  
  <g transform="translate(100, 100)" filter="url(#glow)">
    <!-- Outer creative sound/media rings -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#neonGrad)" stroke-width="3" stroke-dasharray="10 15 25 10" />
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#glowGrad)" stroke-width="1.5" stroke-dasharray="30 20 10" opacity="0.6" />
    
    <!-- Inner OS triangle/gear/core with rounded joints -->
    <polygon points="0,-32 28,16 -28,16" fill="none" stroke="url(#neonGrad)" stroke-width="4.5" stroke-linejoin="round" />
    
    <!-- Core Multimedia / Soundwaves symbol in the middle -->
    <rect x="-11" y="-12" width="4.5" height="24" rx="2.25" fill="#ffffff" />
    <rect x="-2.25" y="-18" width="4.5" height="36" rx="2.25" fill="#ffffff" />
    <rect x="6.5" y="-7" width="4.5" height="14" rx="2.25" fill="#ffffff" />
  </g>
</svg>
